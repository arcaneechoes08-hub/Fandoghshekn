<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FandoghShekan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .app-title {
            color: #d4af37;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }

        .connect-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            border: 3px solid #d4af37;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .connect-button:hover {
            background: linear-gradient(135deg, #a0522d 0%, #8b4513 100%);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            transform: scale(1.1);
        }

        .connect-button:active {
            transform: scale(0.95);
        }

        .status-text {
            color: #cccccc;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-title">FandoghShekan</div>
        <button class="connect-button" onclick="handleConnect()">Connect</button>
        <div class="status-text">Ready to connect</div>
    </div>

    <script>
        function handleConnect() {
            alert('Step 2: VPN connection will be handled after Xray integration');
        }
    </script>
</body>
</html>
