plugins {
    id 'com.android.application'
}

android {
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
    namespace "com.fandogh.shekan"
    compileSdk 34

    defaultConfig {
        applicationId "com.fandogh.shekan"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}


dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
