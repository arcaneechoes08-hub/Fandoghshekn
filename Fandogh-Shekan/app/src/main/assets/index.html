<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فندق‌شکن</title>
    <style>
        body {
            background-color: #5C4033; /* رنگ قهوه‌ای */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .btn {
            width: 150px;
            height: 150px;
            background-color: #D2B48C;
            border-radius: 50%;
            border: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            font-size: 20px;
            font-weight: bold;
            color: #3e2723;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="btn">اتصال</button>
</body>
</html>
