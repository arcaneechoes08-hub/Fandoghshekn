name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🛠️ گام اصلاح‌شده: دانلود نسخه لینوکس-آرم۶۴ که کاملاً با اندروید سازگار است
      - name: Download and Prepare Tun2Socks
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          echo "🔍 در حال یافتن نسخه پایدار لینوکس/اندروید Tun2Socks..."
          
          # اصلاح فیلتر برای پیدا کردن فایل linux-arm64
          LATEST_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest | jq -r '.assets[] | select(.name | ascii_downcase | contains("linux") and contains("arm64") and (contains("v3") | not)) | .browser_download_url' | head -n 1)
          
          if [ -z "$LATEST_URL" ] || [ "$LATEST_URL" == "null" ]; then
            echo "❌ خطا: نتوانستم فایل tun2socks-linux-arm64.zip را پیدا کنم!"
            exit 1
          fi
          
          echo "📥 در حال دانلود از: $LATEST_URL"
          curl -L -o tun2socks.zip "$LATEST_URL"
          
          echo "📦 استخراج فایل باینری..."
          unzip -o tun2socks.zip -d tun2socks_extracted
          
          echo "⚙️ انتقال و تغییر نام به ساختار نیتیو اندروید..."
          find tun2socks_extracted -type f \( -name "*tun2socks*" -o -name "tun2socks" \) -exec mv {} app/src/main/jniLibs/arm64-v8a/libtun2socks.so \;
          chmod +x app/src/main/jniLibs/arm64-v8a/libtun2socks.so
          
          echo "✅ فایل libtun2socks.so با موفقیت در پروژه تزریق شد!"

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
