name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🛠️ گام اصلاح‌شده: دانلود هوشمند و بدون خطای Tun2Socks با استفاده از jq
      - name: Download and Prepare Tun2Socks
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          echo "🔍 در حال یافتن آخرین نسخه لایه مترجم Tun2Socks..."
          
          # استخراج دقیق لینک دانلود با استفاده از jq و فیلتر کردن بر اساس سیستم‌عامل و معماری
          LATEST_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest | jq -r '.assets[] | select(.name | ascii_downcase | contains("android") and contains("arm64")) | .browser_download_url' | head -n 1)
          
          # بررسی برای اطمینان از پیدا شدن لینک
          if [ -z "$LATEST_URL" ] || [ "$LATEST_URL" == "null" ]; then
            echo "❌ خطا: نتوانستم لینک دانلود مناسب برای اندروید arm64 پیدا کنم!"
            echo "📋 لیست کل فایل‌های این ریلیز جهت بررسی:"
            curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest | jq -r '.assets[].name'
            exit 1
          fi
          
          echo "📥 در حال دانلود از: $LATEST_URL"
          curl -L -o tun2socks.zip "$LATEST_URL"
          
          echo "📦 استخراج فایل باینری..."
          unzip -o tun2socks.zip -d tun2socks_extracted
          
          echo "⚙️ انتقال و تغییر نام به ساختار نیتیو اندروید..."
          # پیدا کردن خود فایل باینری درون پوشه استخراج شده و انتقال آن
          find tun2socks_extracted -type f \( -name "*tun2socks*" -o -name "tun2socks" \) -exec mv {} app/src/main/jniLibs/arm64-v8a/libtun2socks.so \;
          chmod +x app/src/main/jniLibs/arm64-v8a/libtun2socks.so
          
          echo "✅ فایل libtun2socks.so با موفقیت در پروژه تزریق شد!"

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
