name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Prepare Sing-box Core
        run: |
          mkdir -p app/src/main/assets
          
          TAG_NAME=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          VERSION=${TAG_NAME#v}
          
          echo "📥 Downloading Sing-box v$VERSION for arm64-v8a..."
          curl -L -o singbox-arm64.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${TAG_NAME}/sing-box-${VERSION}-linux-arm64.tar.gz"
          tar -xzf singbox-arm64.tar.gz
          mv sing-box-${VERSION}-linux-arm64/sing-box app/src/main/assets/singbox-arm64-v8a
          
          echo "📥 Downloading Sing-box v$VERSION for armeabi-v7a..."
          curl -L -o singbox-armv7.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${TAG_NAME}/sing-box-${VERSION}-linux-armv7.tar.gz"
          tar -xzf singbox-armv7.tar.gz
          mv sing-box-${VERSION}-linux-armv7/sing-box app/src/main/assets/singbox-armeabi-v7a
          
          echo "✅ Sing-box Core binaries packaged into assets successfully!"

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
